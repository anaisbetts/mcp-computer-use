name: Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to backfill, for example v0.5.0
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish CI artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: ./scripts/publish-release-assets.sh --tag "$RELEASE_TAG"
