name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mcp-computer-use

jobs:
  build-test:
    name: Build and test (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: mcp-computer-use-linux-amd64
            artifact_name: mcp-computer-use-linux-amd64
          - os: macos-latest
            asset_name: mcp-computer-use-macos-arm64
            artifact_name: mcp-computer-use-macos-arm64
          - os: windows-latest
            asset_name: mcp-computer-use-win32-amd64
            artifact_name: mcp-computer-use-win32-amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdrm-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libwayland-dev \
            libxdo-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Build release binary
        run: cargo build --locked --release

      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/${{ matrix.asset_name }}.tar.gz" "${BINARY_NAME}"

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/release/$env:BINARY_NAME.exe" -DestinationPath "dist/${{ matrix.asset_name }}.zip" -Force

      - name: Upload artifact for release tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

      - name: Upload artifact for CI runs
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          retention-days: 7
